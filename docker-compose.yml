services:
  aicon:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: aicon
    environment:
      - WORKSPACE=${WORKSPACE:-.}
    volumes:
      - opencode:/home/node/.config/opencode
      - ${WORKSPACE:-.}:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  opencode:
